# DigitalOcean App Platform Configuration
# Copy this to app.yaml and add your environment variables in the App Platform dashboard

name: hess-sheriff-campaign
services:
- name: sheriff-campaign
  source_dir: /
  github:
    repo: bmhess68/sheriff
    branch: UpdatesScholarship
  run_command: npm start
  environment_slug: node-js
  instance_count: 1
  instance_size_slug: basic-xxs
  envs:
  - key: GMAIL_USER
    value: info@hessforsheriff.com
  - key: GMAIL_APP_PASSWORD
    value: ${GMAIL_APP_PASSWORD}  # Set this in App Platform dashboard
    type: SECRET
  - key: CAMPAIGN_EMAIL
    value: info@hessforsheriff.com
  - key: SCHOLARSHIP_EMAIL
    value: hessscholarshipfund@gmail.com
  - key: NODE_ENV
    value: production
  - key: PORT
    value: "8080"
  http_port: 8080
