# DigitalOcean App Platform Configuration
name: hess-sheriff-campaign
services:
- name: sheriff-campaign
  source_dir: /
  github:
    repo: bmhess68/sheriff
    branch: main
  run_command: npm start
  environment_slug: node-js
  instance_count: 1
  instance_size_slug: basic-xxs
  envs:
  - key: SENDGRID_API_KEY
    value: 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
    type: SECRET
  - key: CAMPAIGN_EMAIL
    value: info@hessforsheriff.com
  - key: FROM_EMAIL
    value: noreply@hessforsheriff.com
