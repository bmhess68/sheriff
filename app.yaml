    value: production
  - key: PORT
    value: "8080"
  http_port: 8080
static_sites:
- name: campaign-assets
  source_dir: /assets
  github:
    repo: bmhess68/sheriff
    branch: main
  build_command: echo "No build needed"
  output_dir: /
