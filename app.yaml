# DigitalOcean App Platform Configuration
name: hess-sheriff-campaign
services:
- name: sheriff-campaign
  source_dir: /
  github:
    repo: bmhess68/sheriff
    branch: stripe-donation-integration
  run_command: npm start
  environment_slug: node-js
  instance_count: 1
  instance_size_slug: basic-xxs
  envs:
  - key: GMAIL_USER
    value: info@hessforsheriff.com
  - key: GMAIL_APP_PASSWORD
    value: 
    type: SECRET
  - key: CAMPAIGN_EMAIL
    value: info@hessforsheriff.com
  - key: NODE_ENV
    value: production
  - key: PORT
    value: "8080"
  http_port: 8080
static_sites:
- name: campaign-assets
  source_dir: /assets
  github:
    repo: bmhess68/sheriff
    branch: main
  build_command: echo "No build needed"
  output_dir: /
